<!-- largest of 3 numbers -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = Number(prompt("a"));
        let b = Number(prompt("b"));
        let c = Number(prompt("c"));
        if(a>b){
            if(a>c){
                console.log(a);
            }
            else{
                console.log(c);
            }
        }
        else if(b>a){
            if(b>c){
                console.log(b);
            }
            else{
                console.log(c);
            }
        }
    </script>
</body>
</html>
