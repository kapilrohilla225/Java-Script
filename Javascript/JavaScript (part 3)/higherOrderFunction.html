    <title>Higher Order Function</title>
</head>

<body>
    <script>
        function oddEvenFactory(request) {
            if (request === "odd") {
                return function (n) {
                    console.log(n % 2 !== 0);
                    return n % 2 !== 0;
                };
            } else if (request === "even") {
                return function (n) {
                    console.log(n % 2 === 0);
                    return n % 2 === 0;
                };
            } else {
                console.log("Invalid Request");
            }
        }

        const checkOdd = oddEvenFactory("odd");
        const checkEven = oddEvenFactory("even");



    </script>
